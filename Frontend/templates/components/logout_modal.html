<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modal Déconnexion</title>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
    --gradient-orange: #ff6b35;
    --gradient-blue: #4a90e2;
    --gradient-purple: #9b59b6;
    --neon-orange: #ff7a50;
    --background: #0a0a0a;
    --foreground: #f5f5f5;
    --card: #141414;
    --popover: #1a1a1a;
    --popover-foreground: #f5f5f5;
    --primary: #ff6b35;
    --secondary: #1f1f1f;
    --muted: #252525;
    --muted-foreground: #a0a0a0;
    --accent: #2a2a2a;
    --destructive: #d4183d;
    --border: rgba(255, 255, 255, 0.08);
    --ring: rgba(255, 107, 53, 0.5);
    --radius: 1rem;
}

.hidden { display: none !important; }

/* ── Overlay ── */
.logout-modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
}

/* ── Box ── */
.logout-modal-content {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 90%;
    max-width: 400px;
    padding: 28px;
    box-shadow:
        0 0 0 1px rgba(255,107,53,0.08),
        0 24px 48px rgba(0,0,0,0.6),
        0 0 80px rgba(255,107,53,0.04);
    animation: modalIn 0.22s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
}

/* subtle top gradient line */
.logout-modal-content::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg,
        transparent,
        rgba(255,107,53,0.6) 30%,
        rgba(74,144,226,0.4) 70%,
        transparent
    );
}

/* ── Header ── */
.logout-modal-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
}

.logout-modal-icon-wrap {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: rgba(212, 24, 61, 0.12);
    border: 1px solid rgba(212, 24, 61, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.logout-modal-icon {
    width: 18px;
    height: 18px;
    color: #e8365d;
}

.logout-modal-header h3 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--foreground);
    margin: 0;
    letter-spacing: -0.01em;
}

/* ── Divider ── */
.logout-modal-divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 18px;
}

/* ── Text ── */
.logout-modal-text {
    color: var(--muted-foreground);
    font-size: 0.9rem;
    margin: 0 0 24px 0;
    line-height: 1.6;
}

/* ── Actions ── */
.logout-modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}

.logout-modal-btn {
    padding: 9px 20px;
    border-radius: calc(var(--radius) - 4px);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    border: none;
    outline: none;
    letter-spacing: 0.01em;
}

/* Annuler */
.logout-modal-btn-cancel {
    background: var(--accent);
    border: 1px solid var(--border);
    color: var(--muted-foreground);
}

.logout-modal-btn-cancel:hover {
    background: var(--muted);
    color: var(--foreground);
    border-color: rgba(255,255,255,0.15);
}

/* Confirmer */
.logout-modal-btn-confirm {
    background: linear-gradient(135deg, #d4183d, #a8102e);
    color: #fff;
    border: 1px solid rgba(212,24,61,0.3);
    box-shadow: 0 0 16px rgba(212,24,61,0.2);
    display: flex;
    align-items: center;
    gap: 7px;
}

.logout-modal-btn-confirm:hover {
    background: linear-gradient(135deg, #e01f47, #c01235);
    box-shadow: 0 0 24px rgba(212,24,61,0.4);
    transform: translateY(-1px);
}

.logout-modal-btn-confirm:active {
    transform: translateY(0);
}

.btn-icon {
    width: 14px;
    height: 14px;
}

/* ── Animation ── */
@keyframes modalIn {
    from {
        opacity: 0;
        transform: translateY(12px) scale(0.97);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

/* ── Demo trigger button ── */
.demo-btn {
    padding: 10px 22px;
    background: linear-gradient(135deg, var(--gradient-orange), var(--gradient-blue));
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="confirm-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h2 id="modal-title">Déconnexion</h2>
        <p id="modal-message">Êtes-vous sûr de vouloir faire cela ?</p>
        
        <div class="modal-buttons">
            <button onclick="closeModal()">Annuler</button>
            <button id="modal-confirm-btn" class="btn-danger">Confirmer</button>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();

    const logoutModal      = document.getElementById("logoutModal");
    const logoutBtn        = document.getElementById("logoutBtn");
    const cancelLogoutBtn  = document.getElementById("cancelLogoutBtn");
    const confirmLogoutBtn = document.getElementById("confirmLogoutBtn");

    logoutBtn.addEventListener("click", () => {
        logoutModal.classList.remove("hidden");
    });

    cancelLogoutBtn.addEventListener("click", () => {
        logoutModal.classList.add("hidden");
    });

    // Fermer en cliquant sur l'overlay
    logoutModal.addEventListener("click", (e) => {
        if (e.target === logoutModal) logoutModal.classList.add("hidden");
    });

    // Fermer avec Échap
    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") logoutModal.classList.add("hidden");
    });

    confirmLogoutBtn.addEventListener("click", () => {
        window.location.href = "/logout";
    });
</script>

</body>
</html>
