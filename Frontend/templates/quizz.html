<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCards - Quizz</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        /* Feedback visuel réponses */
        .quiz-option.correct {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(34, 197, 94, 0.1));
            border-color: #22c55e;
            color: #22c55e;
        }
        
        .quiz-option.incorrect {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.1));
            border-color: #ef4444;
            color: #ef4444;
        }
        
        .quiz-option.correct::before {
            content: '✓ ';
            font-weight: bold;
        }
        
        .quiz-option.incorrect::before {
            content: '✗ ';
            font-weight: bold;
        }
        
        .quiz-option:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }
        
        /* Animation feedback */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .quiz-option.incorrect {
            animation: shake 0.5s ease;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .quiz-option.correct {
            animation: pulse 0.5s ease;
        }
        
        /* Status messages */
        .quiz-status.success {
            color: #22c55e;
            font-weight: 600;
        }
        
        .quiz-status.error {
            color: #ef4444;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="gradient-bg">
        <div class="gradient-circle gradient-top-right"></div>
        <div class="gradient-circle gradient-bottom-left"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        {% include 'components/header.html' %}
        <!-- Sidebar -->
        {% include 'components/sidebar.html' %}

        <!-- Main Content -->
        <main class="main-content">
            <div class="view-container active" id="quizView">

                <!-- Quiz Questions -->
                <div class="quiz-container" id="quizQuestions">
                    <div class="quiz-header">
                        <div>
                            <h2 class="quiz-title">Quizz</h2>
                            <p class="quiz-subtitle">Testez vos connaissances</p>
                        </div>
                        <div class="quiz-progress-info">
                            <div class="progress-label">Question</div>
                            <div class="progress-count gradient-text-orange" id="quizProgress">1 / 5</div>
                        </div>
                    </div>

                    <div class="quiz-progress-bar">
                        <div class="quiz-progress-fill" id="quizProgressBar" style="width: 20%"></div>
                    </div>

                    <div class="quiz-question-card">
                        <div class="quiz-question-category" id="quizCategory">—</div>
                        <div class="quiz-question-header">
                            <div class="quiz-question-icon">
                                <i data-lucide="brain"></i>
                            </div>
                            <h3 class="quiz-question-text" id="quizQuestion">Chargement…</h3>
                        </div>
                        <div class="quiz-options" id="quizOptions"></div>
                    </div>

                    <div class="quiz-controls">
                        <div class="quiz-status" id="quizStatus">Sélectionnez une réponse</div>
                        <button class="quiz-next-btn" id="quizNextBtn" disabled>
                            <span id="nextBtnText">Suivant</span>
                            <i data-lucide="arrow-right"></i>
                        </button>
                    </div>
                </div>

                <!-- Quiz Results -->
                <div class="quiz-results hidden" id="quizResults">
                    <div class="quiz-results-header">
                        <div class="quiz-results-icon">
                            <i data-lucide="trophy"></i>
                        </div>
                        <h2 class="quiz-results-title">Quiz Terminé !</h2>
                        <p class="quiz-results-subtitle">Voici vos résultats</p>
                    </div>

                    <div class="quiz-results-card">
                        <div class="quiz-results-score">
                            <div class="quiz-score-value gradient-text-orange" id="quizScoreValue">0 / 5</div>
                            <div class="quiz-score-percentage" id="quizScorePercentage">0% de réussite</div>
                            <div class="quiz-score-progress">
                                <div class="quiz-score-progress-bar" id="quizScoreBar" style="width: 0%"></div>
                            </div>
                        </div>

                        <div class="quiz-results-breakdown">
                            <div class="quiz-breakdown-item">
                                <div class="quiz-breakdown-value quiz-breakdown-correct" id="quizCorrectTotal">0</div>
                                <div class="quiz-breakdown-label">Correctes</div>
                            </div>
                            <div class="quiz-breakdown-item">
                                <div class="quiz-breakdown-value quiz-breakdown-incorrect" id="quizIncorrectTotal">5</div>
                                <div class="quiz-breakdown-label">Incorrectes</div>
                            </div>
                            <div class="quiz-breakdown-item">
                                <div class="quiz-breakdown-value gradient-text-orange" id="quizGrade">C</div>
                                <div class="quiz-breakdown-label">Note</div>
                            </div>
                        </div>
                    </div>

                    <div class="quiz-restart-wrapper">
                        <button class="quiz-restart-btn" id="quizRestartBtn">
                            Recommencer le Quiz
                        </button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // **************************************************************
        // DONNÉES INJECTÉES PAR FLASK
        // **************************************************************
        const SESSION_DATA = {{ session_data | tojson }};
        const QUIZ_DATA    = {{ quiz_data | tojson }};

        // **************************************************************
        // STATE
        // **************************************************************
        let currentIndex   = 0;
        let score          = 0;
        let selectedAnswer = null;
        let answered       = false;
        const userAnswers  = [];

        // **************************************************************
        // DOM ELEMENTS
        // **************************************************************
        const quizProgress    = document.getElementById('quizProgress');
        const quizProgressBar = document.getElementById('quizProgressBar');
        const quizCategory    = document.getElementById('quizCategory');
        const quizQuestion    = document.getElementById('quizQuestion');
        const quizOptions     = document.getElementById('quizOptions');
        const quizStatus      = document.getElementById('quizStatus');
        const quizNextBtn     = document.getElementById('quizNextBtn');
        const nextBtnText     = document.getElementById('nextBtnText');

        // **************************************************************
        // FONCTION: RANDOMISER LES RÉPONSES (Fisher-Yates Shuffle)
        // **************************************************************
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // **************************************************************
        // FONCTION: AFFICHER UNE QUESTION
        // **************************************************************
        function renderQuestion(index) {
            const q = QUIZ_DATA[index];
            if (!q) return;

            // Reset state
            answered = false;
            selectedAnswer = null;
            quizNextBtn.disabled = true;
            quizStatus.textContent = 'Sélectionnez une réponse';
            quizStatus.className = 'quiz-status';

            // Display question
            quizCategory.textContent = q.theme || '—';
            quizQuestion.textContent = q.question_text;

            // Update progress
            const total = QUIZ_DATA.length;
            quizProgress.textContent = `${index + 1} / ${total}`;
            quizProgressBar.style.width = `${((index + 1) / total) * 100}%`;
            nextBtnText.textContent = index === total - 1 ? 'Terminer' : 'Suivant';

            // RANDOMISER LES RÉPONSES
            const shuffledAnswers = shuffleArray(q.answers);

            // Render options
            quizOptions.innerHTML = '';
            shuffledAnswers.forEach((ans, i) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-option';
                btn.textContent = ans.answer_text;
                btn.dataset.index = i;
                btn.dataset.correct = ans.is_correct;
                btn.addEventListener('click', () => selectAnswer(btn, ans));
                quizOptions.appendChild(btn);
            });
        }

        // **************************************************************
        // FONCTION: SÉLECTIONNER UNE RÉPONSE
        // **************************************************************
        function selectAnswer(btn, ans) {
            if (answered) return;
            answered = true;
            selectedAnswer = ans;

            // FEEDBACK VISUEL: Révéler correct / incorrect
            document.querySelectorAll('.quiz-option').forEach(b => {
                b.disabled = true;
                
                const isCorrect = b.dataset.correct === 'True' || b.dataset.correct === 'true' || b.dataset.correct === true;
                
                if (isCorrect) {
                    b.classList.add('correct');
                } else if (b === btn) {
                    b.classList.add('incorrect');
                }
            });

            // MESSAGE DE STATUT
            if (ans.is_correct) {
                score++;
                quizStatus.textContent = '✓ Bonne réponse !';
                quizStatus.className = 'quiz-status success';
            } else {
                quizStatus.textContent = '✗ Mauvaise réponse';
                quizStatus.className = 'quiz-status error';
            }

            // Sauvegarder la réponse utilisateur
            userAnswers.push({ 
                question: QUIZ_DATA[currentIndex], 
                selected: ans 
            });

            quizNextBtn.disabled = false;
        }

        // **************************************************************
        // BOUTON SUIVANT
        // **************************************************************
        quizNextBtn.addEventListener('click', () => {
            if (currentIndex < QUIZ_DATA.length - 1) {
                renderQuestion(++currentIndex);
            } else {
                showResults();
            }
        });

        // **************************************************************
        // FONCTION: AFFICHER LES RÉSULTATS + CONFETTIS (toujours)
        // **************************************************************
        function showResults() {
            document.getElementById('quizQuestions').classList.add('hidden');
            const results = document.getElementById('quizResults');
            results.classList.remove('hidden');

            const total = QUIZ_DATA.length;
            const pct   = total > 0 ? Math.round((score / total) * 100) : 0;
            const grade = pct >= 90 ? 'A' : pct >= 75 ? 'B' : pct >= 60 ? 'C' : pct >= 40 ? 'D' : 'F';

            // Afficher score
            document.getElementById('quizScoreValue').textContent      = `${score} / ${total}`;
            document.getElementById('quizScorePercentage').textContent  = `${pct}% de réussite`;
            document.getElementById('quizScoreBar').style.width         = `${pct}%`;
            document.getElementById('quizCorrectTotal').textContent     = score;
            document.getElementById('quizIncorrectTotal').textContent   = total - score;
            document.getElementById('quizGrade').textContent            = grade;

            // CONFETTIS TOUJOURS (intensité adaptée au score)
            launchConfetti(pct);

            // SAUVEGARDER LE SCORE VIA L'API
            saveQuizScore(score, total);
        }

        // **************************************************************
        // FONCTION: LANCER LES CONFETTIS
        // **************************************************************
        function launchConfetti(pct = 50) {
            // Durée et intensité selon le score
            const duration    = pct >= 70 ? 4000 : 2000;
            const particleMul = pct >= 70 ? 1 : 0.4;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * particleMul * (timeLeft / duration);

                confetti({
                    ...defaults,
                    particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
                });
                confetti({
                    ...defaults,
                    particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
                });
            }, 250);
        }

        // **************************************************************
        // FONCTION: SAUVEGARDER LE SCORE
        // **************************************************************
        async function saveQuizScore(userScore, maxScore) {
            try {
                const response = await fetch(`/api/sessions/${SESSION_DATA.id}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        score: userScore, 
                        max_score: maxScore 
                    })
                });

                if (response.ok) {
                    console.log('✅ Score sauvegardé:', userScore, '/', maxScore);
                } else {
                    console.error('❌ Erreur sauvegarde score:', response.status);
                }
            } catch (error) {
                console.error('❌ Erreur réseau:', error);
            }
        }

        // **************************************************************
        // BOUTON RECOMMENCER
        // **************************************************************
        document.getElementById('quizRestartBtn').addEventListener('click', () => {
            currentIndex = 0; 
            score = 0; 
            userAnswers.length = 0;
            document.getElementById('quizResults').classList.add('hidden');
            document.getElementById('quizQuestions').classList.remove('hidden');
            renderQuestion(0);
        });

        // **************************************************************
        // INITIALISATION
        // **************************************************************
        if (QUIZ_DATA.length > 0) {
            renderQuestion(0);
        } else {
            quizQuestion.textContent = "Aucune question disponible pour cette session.";
        }

        lucide.createIcons();
    </script>
</body>
</html>
