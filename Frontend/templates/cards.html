<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modal Déconnexion</title>

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>

/* ===== Base page ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #12121a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* ===== Bouton pour ouvrir le modal ===== */
.open-modal-btn {
    padding: 1rem 2rem;
    background: #ff6b35;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: bold;
    color: white;
    cursor: pointer;
}

/* ===== Overlay ===== */
.logout-modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

/* Caché */
.hidden {
    display: none;
}

/* ===== Contenu modal ===== */
.logout-modal-content {
    background: linear-gradient(145deg, #1f1f2e, #2a2a3d);
    padding: 2rem;
    border-radius: 20px;
    width: 90%;
    max-width: 480px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    animation: fadeInScale 0.25s ease;
    color: white;
}

/* Animation */
@keyframes fadeInScale {
    from {
        opacity: 0;
        transform: scale(0.95);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* Header */
.logout-modal-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
}

.logout-modal-icon {
    width: 40px;
    height: 40px;
    color: #ff6b35;
}

.logout-modal-header h3 {
    font-size: 1.5rem;
    font-weight: 700;
    margin: 0;
}

/* Texte */
.logout-modal-text {
    color: rgba(255, 255, 255, 0.7);
    font-size: 1rem;
    margin-bottom: 2rem;
    line-height: 1.6;
}

/* Actions */
.logout-modal-actions {
    display: flex;
    gap: 1rem;
    justify-content: flex-end;
}

/* Boutons */
.logout-modal-btn {
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

/* Annuler */
.logout-modal-btn-cancel {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
}

.logout-modal-btn-cancel:hover {
    background: rgba(255, 255, 255, 0.2);
}

/* Confirmer */
.logout-modal-btn-confirm {
    background: #ff6b35;
    color: #fff;
    box-shadow: 0 4px 14px rgba(255, 107, 53, 0.4);
}

.logout-modal-btn-confirm:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 22px rgba(255, 107, 53, 0.6);
}

</style>
</head>

<body>

<button class="open-modal-btn" id="openModalBtn">
    Ouvrir le modal
</button>

<!-- Modal -->
<div class="logout-modal hidden" id="logoutModal">
    <div class="logout-modal-content">
        <div class="logout-modal-header">
            <i data-lucide="log-out" class="logout-modal-icon"></i>
            <h3>Confirmer la déconnexion</h3>
        </div>

        <p class="logout-modal-text">
            Êtes-vous sûr de vouloir vous déconnecter ?
        </p>

        <div class="logout-modal-actions">
            <button class="logout-modal-btn logout-modal-btn-cancel" id="cancelLogoutBtn">
                Annuler
            </button>

            <button class="logout-modal-btn logout-modal-btn-confirm" id="confirmLogoutBtn">
                Se déconnecter
            </button>
        </div>
    </div>
</div>

<script>
const modal = document.getElementById("logoutModal");
const openBtn = document.getElementById("openModalBtn");
const cancelBtn = document.getElementById("cancelLogoutBtn");
const confirmBtn = document.getElementById("confirmLogoutBtn");

openBtn.addEventListener("click", () => {
    modal.classList.remove("hidden");
});

cancelBtn.addEventListener("click", () => {
    modal.classList.add("hidden");
});

confirmBtn.addEventListener("click", () => {
    alert("Déconnexion confirmée !");
    modal.classList.add("hidden");
});

/* Fermer en cliquant sur l'overlay */
modal.addEventListener("click", (e) => {
    if (e.target === modal) {
        modal.classList.add("hidden");
    }
});

/* Initialiser Lucide */
lucide.createIcons();
</script>

</body>
</html>
