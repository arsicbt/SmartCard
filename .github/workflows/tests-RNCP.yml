name: DWWM Certification Tracker
on: [push, pull_request]

jobs:
  check-competences:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Vérification AT1 - Front-End
        run: |
          echo "### Analyse de la partie Front-End" >> $GITHUB_STEP_SUMMARY
          # Vérification Responsive (Recherche de Media Queries)
          if grep -r "media" . --include="*.css" --include="*.scss"; then
            echo "- ✅ Responsive Design détecté (CSS Media Queries)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Pas de Media Queries détectées" >> $GITHUB_STEP_SUMMARY
          fi
          # Vérification Dynamisme (JavaScript)
          if [ -n "$(find . -name "*.js" -not -path "*/node_modules/*")" ]; then
            echo "- ✅ Logique JavaScript présente" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Vérification AT2 - Back-End
        run: |
          echo "### Analyse de la partie Back-End" >> $GITHUB_STEP_SUMMARY
          # Vérification Base de données (Modèles SQLAlchemy pour SmartCards)
          if grep -r "db.Model" . --include="*.py"; then
            echo "- ✅ Modèles de données (ORM) détectés" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Pas de modèles SQLAlchemy trouvés" >> $GITHUB_STEP_SUMMARY
          fi
          # Vérification API (Routeurs Flask)
          if grep -r "@app.route" . --include="*.py"; then
            echo "- ✅ Routes API / Backend détectées" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Vérification Sécurité & Qualité
        run: |
          echo "### Sécurité et Bonnes Pratiques" >> $GITHUB_STEP_SUMMARY
          # Vérification de l'existence d'un .gitignore (Obligatoire pour le titre)
          if [ -f ".gitignore" ]; then
            echo "- ✅ .gitignore présent" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ .gitignore manquant (Risque de sécurité !)" >> $GITHUB_STEP_SUMMARY
          fi
          # Vérification Documentation
          if [ -f "README.md" ]; then
            echo "- ✅ README.md présent" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Conclusion
        run: |
          echo "---" >> $GITHUB_STEP_SUMMARY