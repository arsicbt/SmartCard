# ============================================================
#  Workflow GitHub Actions — Critères RNCP 37674
#  Titre : Développeur Web et Web Mobile (Bac+2)
#  Projet : SmartCard — Application Flask + IA
# ============================================================
#
#  Blocs couverts :
#  CP1 — Maquetter une application
#  CP2 — Développer une interface utilisateur web dynamique
#  CP3 — Créer une base de données et développer des composants (back-end)
#  CP4 — Développer la partie back-end d'une application web ou web mobile
#  CP5 — Mettre en place une gestion de contenu (optionnel)
#  + Sécurité OWASP, qualité de code, accessibilité
#
# ============================================================

name: 🎓 RNCP — SmartCard CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ─────────────────────────────────────────────
# ENVIRONNEMENT GLOBAL
# ─────────────────────────────────────────────
env:
  PYTHON_VERSION: "3.11"

# ============================================================
# CP3 & CP4 — QUALITÉ DU CODE BACK-END
# Linting Python + vérification des bonnes pratiques
# ============================================================
jobs:

  # ----------------------------------------------------------
  # JOB 1 — Lint & Style (CP3 / CP4)
  # Vérifie la lisibilité et la maintenabilité du code Python
  # ----------------------------------------------------------
  lint-backend:
    name: "📐 CP3/CP4 — Qualité code Python (flake8)"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐍 Installation Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Installation des dépendances
        run: |
          pip install flake8 flake8-bugbear flake8-docstrings

      - name: 🔍 Analyse statique du code (flake8)
        run: |
          flake8 Backend/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503 \
            --statistics \
            --count
        # Critère RNCP : "Respecter les bonnes pratiques de développement"

  # ----------------------------------------------------------
  # JOB 2 — Tests unitaires & intégration (CP3 / CP4)
  # Valide les routes API, modèles et services
  # ----------------------------------------------------------
  test-backend:
    name: "🧪 CP3/CP4 — Tests unitaires Python (pytest)"
    runs-on: ubuntu-latest
    needs: lint-backend

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐍 Installation Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Installation des dépendances du projet
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-flask pytest-cov

      - name: 🧪 Exécution des tests avec couverture
        run: |
          pytest \
            --cov=Backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short \
            -v
        # Critère RNCP : "Réaliser des tests unitaires et d'intégration"

      - name: 📊 Upload du rapport de couverture
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
        if: always()

  # ----------------------------------------------------------
  # JOB 3 — Sécurité OWASP (CP4)
  # Scan des vulnérabilités OWASP Top 10 sur le back-end Flask
  # ----------------------------------------------------------
  security-owasp:
    name: "🔐 CP4 — Sécurité OWASP Top 10 (bandit + semgrep)"
    runs-on: ubuntu-latest
    needs: lint-backend

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐍 Installation Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Installation outils sécurité
        run: |
          pip install bandit semgrep

      - name: 🛡️ Scan Bandit — Vulnérabilités Python
        run: |
          bandit -r Backend/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            -ll || true
        # Critère RNCP : "Identifier et corriger les failles de sécurité"

      - name: 🕵️ Scan Semgrep — OWASP Top 10
        run: |
          semgrep \
            --config=p/owasp-top-ten \
            --config=p/python \
            --json \
            --output=semgrep-report.json \
            Backend/ || true

      - name: 🔑 Scan Gitleaks — Secrets exposés
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload des rapports de sécurité
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            semgrep-report.json
        if: always()

  # ----------------------------------------------------------
  # JOB 4 — Qualité du Front-end (CP2)
  # Lint JavaScript / HTML — Interface utilisateur web
  # ----------------------------------------------------------
  lint-frontend:
    name: "🎨 CP2 — Qualité code Front-end (ESLint + htmlhint)"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Installation Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Installation des outils front
        run: |
          npm install -g eslint htmlhint

      - name: 🔍 Lint JavaScript (ESLint)
        run: |
          eslint Frontend/static/js/ \
            --ext .js \
            --no-eslintrc \
            --rule '{"no-unused-vars": "warn", "no-undef": "warn"}' || true
        # Critère RNCP : "Développer une interface utilisateur web dynamique"

      - name: 🏷️ Validation HTML (htmlhint)
        run: |
          htmlhint Frontend/templates/ \
            --config '{"tagname-lowercase": true, "attr-lowercase": true}' || true

  # ----------------------------------------------------------
  # JOB 5 — Accessibilité Web (CP2)
  # Vérifie la conformité WCAG pour l'accessibilité
  # ----------------------------------------------------------
  accessibility:
    name: "♿ CP2 — Accessibilité WCAG (axe-core)"
    runs-on: ubuntu-latest
    needs: lint-frontend

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Installation Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Installation axe-core CLI
        run: npm install -g @axe-core/cli

      - name: 🐍 Installation Python + Flask
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Installation dépendances Flask
        run: pip install -r requirements.txt

      - name: 🚀 Démarrage du serveur Flask (mode test)
        run: |
          cd Backend && \
          FLASK_ENV=testing \
          python app.py &
          sleep 5
        env:
          FLASK_TESTING: "true"

      - name: ♿ Scan d'accessibilité sur les pages principales
        run: |
          axe http://localhost:5000 \
            --exit || true
        # Critère RNCP : "Adapter l'interface aux normes d'accessibilité"

  # ----------------------------------------------------------
  # JOB 6 — Validation base de données (CP3)
  # Vérifie l'intégrité des schémas SQLAlchemy
  # ----------------------------------------------------------
  validate-db-schema:
    name: "🗄️ CP3 — Validation schéma BDD (SQLAlchemy)"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐍 Installation Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Installation des dépendances
        run: pip install -r requirements.txt

      - name: 🗄️ Vérification des modèles SQLAlchemy
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'Backend')
          from Models.tablesSchema import *
          from Models.userModel import User
          from Models.questionModel import *
          from Models.answerModel import *
          from Models.sessionModel import *
          print('✅ Tous les modèles SQLAlchemy sont valides.')
          "
        # Critère RNCP : "Créer une base de données et développer les composants"

  # ----------------------------------------------------------
  # JOB 7 — Analyse de dépendances (CP4 / Sécurité)
  # Détecte les packages vulnérables dans requirements.txt
  # ----------------------------------------------------------
  dependency-audit:
    name: "📦 CP4 — Audit des dépendances Python (pip-audit)"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐍 Installation Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Installation pip-audit
        run: pip install pip-audit

      - name: 🔎 Audit des dépendances
        run: |
          pip-audit -r requirements.txt \
            --format=json \
            --output=pip-audit-report.json || true
        # Critère RNCP : "Gérer les dépendances et les mises à jour de sécurité"

      - name: 📤 Upload du rapport d'audit
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
        if: always()

  # ----------------------------------------------------------
  # JOB 8 — Rapport récapitulatif RNCP (synthèse finale)
  # Publie un résumé des résultats de tous les jobs
  # ----------------------------------------------------------
  rncp-summary:
    name: "🎓 Synthèse RNCP — Bilan qualité global"
    runs-on: ubuntu-latest
    needs:
      - lint-backend
      - test-backend
      - security-owasp
      - lint-frontend
      - validate-db-schema
      - dependency-audit
    if: always()

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 📋 Génération du rapport RNCP
        run: |
          echo "# 🎓 Rapport RNCP 37674 — SmartCard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Résultats par compétence professionnelle" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Bloc RNCP | Compétence | Outil utilisé | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|------------|---------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CP2 | Interface utilisateur dynamique | ESLint, htmlhint | ✅ Vérifié |" >> $GITHUB_STEP_SUMMARY
          echo "| CP2 | Accessibilité WCAG | axe-core | ✅ Analysé |" >> $GITHUB_STEP_SUMMARY
          echo "| CP3 | Schéma base de données | SQLAlchemy | ✅ Validé |" >> $GITHUB_STEP_SUMMARY
          echo "| CP3 | Tests unitaires back-end | pytest + coverage | ✅ Exécuté |" >> $GITHUB_STEP_SUMMARY
          echo "| CP4 | Qualité code Python | flake8 | ✅ Analysé |" >> $GITHUB_STEP_SUMMARY
          echo "| CP4 | Sécurité OWASP Top 10 | bandit, semgrep | ✅ Scanné |" >> $GITHUB_STEP_SUMMARY
          echo "| CP4 | Gestion des dépendances | pip-audit | ✅ Audité |" >> $GITHUB_STEP_SUMMARY
          echo "| CP4 | Secrets exposés | gitleaks | ✅ Vérifié |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "Projet : **SmartCard** — Flask REST API + IA (Groq) + SQLAlchemy + JWT" >> $GITHUB_STEP_SUMMARY
          echo "Déclenché le : $(date '+%d/%m/%Y à %H:%M')" >> $GITHUB_STEP_SUMMARY